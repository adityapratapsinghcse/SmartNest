<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="copperGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0A868"/>
      <stop offset="100%" stop-color="#C6813F"/>
    </linearGradient>
    <radialGradient id="bgGrad" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#1B2028"/>
      <stop offset="100%" stop-color="#12161B"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)"/>

  <!-- orbit / nexus rings -->
  <circle cx="256" cy="256" r="168" fill="none" stroke="#4FA3D1" stroke-opacity="0.25" stroke-width="2"/>
  <circle cx="256" cy="256" r="200" fill="none" stroke="#4FA3D1" stroke-opacity="0.12" stroke-width="2"/>

  <!-- radiating network nodes -->
  <g stroke="url(#copperGrad)" stroke-width="3" stroke-linecap="round" opacity="0.85">
    <line x1="256" y1="88" x2="256" y2="130"/>
    <line x1="256" y1="424" x2="256" y2="382"/>
    <line x1="88" y1="256" x2="130" y2="256"/>
    <line x1="424" y1="256" x2="382" y2="256"/>
    <line x1="140" y1="140" x2="168" y2="168"/>
    <line x1="372" y1="140" x2="344" y2="168"/>
    <line x1="140" y1="372" x2="168" y2="344"/>
    <line x1="372" y1="372" x2="344" y2="344"/>
  </g>
  <g fill="url(#copperGrad)">
    <circle cx="256" cy="88" r="7"/>
    <circle cx="256" cy="424" r="7"/>
    <circle cx="88" cy="256" r="7"/>
    <circle cx="424" cy="256" r="7"/>
    <circle cx="140" cy="140" r="6"/>
    <circle cx="372" cy="140" r="6"/>
    <circle cx="140" cy="372" r="6"/>
    <circle cx="372" cy="372" r="6"/>
  </g>

  <!-- dome housing -->
  <path d="M 176 288 A 80 80 0 0 1 336 288 Z" fill="url(#copperGrad)"/>
  <rect x="176" y="288" width="160" height="14" rx="4" fill="url(#copperGrad)"/>

  <!-- home silhouette cut into the dome -->
  <path d="M 256 208 L 314 254 V 302 H 282 V 268 H 230 V 302 H 198 V 254 Z" fill="#12161B"/>

  <!-- base plinth -->
  <rect x="196" y="316" width="120" height="10" rx="5" fill="#4FA3D1" opacity="0.6"/>
</svg>
